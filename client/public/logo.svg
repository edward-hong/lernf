<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#111111" rx="64" />
  
  <!-- Terminal prompt -->
  <text 
    x="40" 
    y="340" 
    font-family="'Space Mono', monospace" 
    font-weight="700" 
    font-size="100" 
    fill="#666666"
  >&gt;</text>
  
  <!-- Lettermark -->
  <text 
    x="130" 
    y="340" 
    font-family="'Space Mono', monospace" 
    font-weight="700" 
    font-size="100" 
    fill="#ffffff" 
    letter-spacing="-1"
  >lernf</text>
  
  <!-- Underscore rule -->
  <rect x="130" y="355" width="345" height="3" fill="#ffffff" />
</svg>